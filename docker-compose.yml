services:
  db2:
    image: icr.io/db2_community/db2:latest
    container_name: db2-test
    privileged: true
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: db2test123
      DBNAME: TESTDB
      ARCHIVE_LOGS: "false"
      AUTOCONFIG: "false"
    ports:
      - "50000:50000"
    volumes:
      - db2-data:/database
    healthcheck:
      test: ["CMD", "su", "-", "db2inst1", "-c", "db2 connect to TESTDB"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  db2-data:
